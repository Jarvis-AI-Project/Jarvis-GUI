<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 15px 20px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #30363d; position: relative; background: #161b22; z-index: 10; }
        header h1 { font-size: 18px; color: #58a6ff; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        
        .header-btns { position: absolute; right: 20px; display: flex; gap: 8px; }
        .h-btn { background: transparent; border: 1px solid #30363d; color: #8b949e; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .h-btn:hover { background: #30363d; color: #f0f6fc; }
        .load-btn { border-color: #238636; color: #3fb950; }

        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-color: #0d1117; scroll-behavior: smooth; }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 14px; font-size: 14.5px; line-height: 1.6; word-wrap: break-word; }
        .user { align-self: flex-end; background-color: #1f6feb; color: white; border-bottom-right-radius: 2px; }
        .jarvis { align-self: flex-start; background-color: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 2px; }

        /* MARKDOWN STYLES */
        .jarvis strong { color: #58a6ff; font-weight: 700; }
        .jarvis code { background: #30363d; padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 13px; color: #ff7b72; }
        .code-container { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; margin: 12px 0; overflow: hidden; width: 100%; }
        .code-header { background: #161b22; padding: 8px 12px; font-size: 11px; color: #8b949e; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        pre { padding: 15px; overflow-x: auto; font-family: 'Consolas', monospace; margin: 0; }
        pre code { background: transparent; padding: 0; color: #79c0ff; font-size: 13px; white-space: pre; }

        /* INPUT AREA */
        .input-area { padding: 10px 20px 20px; background: #161b22; border-top: 1px solid #30363d; }
        .input-box { display: flex; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 6px 12px; align-items: center; gap: 10px; max-width: 900px; margin: 0 auto; }
        
        .upload-label { cursor: pointer; color: #8b949e; display: flex; align-items: center; transition: 0.2s; }
        .upload-label:hover { color: #58a6ff; }
        #file-input { display: none; }

        #user-input { flex-grow: 1; border: none; background: transparent; padding: 10px; outline: none; color: #ecf2f8; font-size: 15px; }
        .send-btn { background: #238636; border: none; padding: 8px 18px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        .disclaimer { text-align: center; font-size: 11px; color: #8b949e; margin-top: 10px; }
        #loading-bar { height: 2px; background: #58a6ff; width: 0%; transition: width 0.3s; position: absolute; bottom: 0; left: 0; display: none; }
        #file-info { display: none; padding: 5px 12px; font-size: 11px; color: #58a6ff; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>JARVIS</h1>
    <div class="header-btns">
        <button class="h-btn load-btn" onclick="loadChat()">Yükle</button>
        <button class="h-btn" onclick="clearChat()">Sıfırla</button>
    </div>
    <div id="loading-bar"></div>
</header>

<div id="chat-box"></div>

<div class="input-area">
    <div id="file-info"></div>
    <div class="input-box">
        <label for="file-input" class="upload-label">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-2.21-1.79-4-4-4S8 2.79 8 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
        </label>
        <input type="file" id="file-input" onchange="showFile(this)">
        
        <input type="text" id="user-input" placeholder="Aklınızda ne var?" autocomplete="off">
        <button class="send-btn" onclick="handleSend()">Gönder</button>
    </div>
    <div class="disclaimer">Jarvis bir dil modeli olduğu için hata yapabilir.</div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const loadingBar = document.getElementById('loading-bar');
    const fileInfo = document.getElementById('file-info');
    const API_URL = "https://jarvis-omega-eosin.vercel.app/api/chat";
    let history = [];
    let activeFile = null;

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    function showFile(input) {
        if (input.files && input.files[0]) {
            activeFile = input.files[0];
            fileInfo.style.display = "block";
            fileInfo.textContent = `Dosya: ${activeFile.name}`;
        }
    }

    function parseMarkdown(text) {
        let html = text;
        html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
            return `<div class="code-container"><div class="code-header"><span>${(lang || 'CODE').toUpperCase()}</span></div><pre><code>${escapeHTML(code.trim())}</code></pre></div>`;
        });
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\n/g, '<br>');
        return html;
    }

    function addMessage(role, text, save = true) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        if (role === 'jarvis') {
            div.innerHTML = parseMarkdown(text);
        } else {
            div.textContent = text;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        if (save) saveToLocal();
    }

    function saveToLocal() {
        localStorage.setItem('jarvis_history', JSON.stringify(history));
        localStorage.setItem('jarvis_html', chatBox.innerHTML);
    }

    function loadChat() {
        const savedHTML = localStorage.getItem('jarvis_html');
        const savedHistory = localStorage.getItem('jarvis_history');
        if (savedHTML && savedHistory) {
            chatBox.innerHTML = savedHTML;
            history = JSON.parse(savedHistory);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function clearChat() {
        if(confirm("Tüm sohbet silinsin mi?")) {
            localStorage.clear();
            location.reload();
        }
    }

    async function handleSend() {
        const val = userInput.value.trim();
        if (!val && !activeFile) return;

        const userMsg = activeFile ? `[${activeFile.name}] ${val}` : val;
        addMessage('user', userMsg);
        
        userInput.value = '';
        fileInfo.style.display = "none";
        activeFile = null;

        loadingBar.style.display = 'block';
        loadingBar.style.width = '50%';
        history.push({ role: "user", content: val });

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: history, model: "llama-3.3" })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            addMessage('jarvis', reply);
            history.push({ role: "assistant", content: reply });
        } catch (e) {
            addMessage('jarvis', "Bağlantı kesildi.", false);
        } finally {
            loadingBar.style.width = '100%';
            setTimeout(() => { loadingBar.style.display = 'none'; loadingBar.style.width = '0%'; }, 400);
        }
    }

    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

    window.onload = () => {
        if (chatBox.children.length === 0) {
            addMessage('jarvis', 'Merhaba. Ben Jarvis. Nasıl yardımcı olabilirim?', false);
        }
    };
</script>

</body>
</html>
