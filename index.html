<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #30363d; position: relative; }
        header h1 { font-size: 18px; color: #58a6ff; font-weight: 600; letter-spacing: 1px; }
        .reset-btn { position: absolute; right: 20px; background: transparent; border: 1px solid #30363d; color: #8b949e; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #0d1117; }
        
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background-color: #1f6feb; color: white; border-bottom-right-radius: 2px; }
        .jarvis { align-self: flex-start; background-color: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 2px; }

        .code-container { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; margin: 10px 0; overflow: hidden; }
        .code-header { background: #161b22; padding: 8px 12px; font-size: 12px; color: #8b949e; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        pre { padding: 15px; overflow-x: auto; font-family: 'Consolas', monospace; }
        code { color: #79c0ff; font-size: 13px; white-space: pre; }

        .input-area { padding: 15px 20px; background: #0d1117; border-top: 1px solid #30363d; }
        .input-box { display: flex; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 5px 10px; align-items: center; }
        #user-input { flex-grow: 1; border: none; background: transparent; padding: 10px; outline: none; color: #ecf2f8; font-size: 15px; }
        .send-btn { background: #238636; border: none; padding: 8px 16px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
        
        #loading-bar { height: 2px; background: #58a6ff; width: 0%; transition: width 0.3s; position: absolute; bottom: 0; left: 0; display: none; }
        strong { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>JARVIS</h1>
    <button class="reset-btn" onclick="location.reload()">Sıfırla</button>
    <div id="loading-bar"></div>
</header>

<div id="chat-box"></div>

<div class="input-area">
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Aklınızda ne var?" autocomplete="off">
        <button class="send-btn" onclick="handleAction()">Gönder</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const loadingBar = document.getElementById('loading-bar');
    const API_URL = "https://jarvis-omega-eosin.vercel.app/api/chat";
    let history = [];

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    function addMessage(role, content, isHTML = false) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        if (isHTML) {
            div.innerHTML = content;
        } else {
            div.textContent = content;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function handleAction() {
        const query = userInput.value.trim();
        if (!query) return;

        addMessage('user', query);
        userInput.value = '';

        loadingBar.style.display = 'block';
        loadingBar.style.width = '50%';
        history.push({ role: "user", content: query });

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: history, model: "llama-3.3" })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            // Markdown İşleme
            let formatted = reply;
            
            // Kod blokları
            formatted = formatted.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<div class="code-container"><div class="code-header"><span>${(lang||'KOD').toUpperCase()}</span></div><pre><code>${escapeHTML(code.trim())}</code></pre></div>`;
            });

            // Kalınlaştırma ve satır sonları
            formatted = formatted
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            addMessage('jarvis', formatted, true);
            history.push({ role: "assistant", content: reply });
        } catch (e) {
            addMessage('jarvis', "Bağlantı hatası oluştu.");
        } finally {
            loadingBar.style.width = '100%';
            setTimeout(() => { loadingBar.style.display = 'none'; loadingBar.style.width = '0%'; }, 500);
        }
    }

    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });

    window.onload = () => {
        addMessage('jarvis', 'Merhaba. Ben Jarvis. Nasıl yardımcı olabilirim?');
    };
</script>

</body>
</html>
