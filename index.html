<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Interface</title>
    <style>
        :root { --neon: #00f2ff; --bg: #05080a; --panel: #0d1117; }
        body { background: var(--bg); color: #c9d1d9; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 15px; border-bottom: 2px solid var(--neon); text-align: center; }
        h1 { margin: 0; font-size: 1.2rem; color: var(--neon); letter-spacing: 5px; }
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 5px; line-height: 1.5; }
        .user { align-self: flex-end; background: #161b22; color: #58a6ff; border: 1px solid #30363d; }
        .jarvis { align-self: flex-start; background: #0d1117; border: 1px solid var(--neon); }
        #input-area { padding: 20px; background: var(--panel); display: flex; gap: 10px; border-top: 1px solid #30363d; }
        input[type="text"] { flex-grow: 1; background: #010409; border: 1px solid #30363d; padding: 12px; color: var(--neon); outline: none; }
        button { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 0 15px; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--neon); color: black; }
        .loading { font-size: 10px; color: var(--neon); display: none; padding: 0 20px 10px; }
    </style>
</head>
<body>

    <div id="header"><h1>JARVIS V3</h1></div>
    <div id="chat-box"><div class="msg jarvis">Sistem aktif. Sorgu veya dosya bekliyorum.</div></div>
    <div id="loading" class="loading">VERİ İŞLENİYOR...</div>

    <div id="input-area">
        <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(event)">
        <button onclick="document.getElementById('file-input').click()">DOSYA</button>
        <input type="text" id="user-input" placeholder="Mesaj yazın..." autocomplete="off">
        <button id="send-btn">GÖNDER</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const loading = document.getElementById('loading');
        const API_URL = "https://jarvis-omega-eosin.vercel.app/api/chat";
        let chatHistory = [];

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user' : 'jarvis'}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            if (role !== 'status') chatHistory.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result;
                addMessage('user', `[Dosya: ${file.name}] İçeriği analiz et.`);
                chatHistory.push({ role: "user", content: `Dosya içeriği (${file.name}):\n\n${content}` });
                processRequest();
            };
            reader.readAsText(file);
        }

        async function processRequest() {
            loading.style.display = 'block';
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: chatHistory })
                });
                const data = await response.json();
                if (data.choices) addMessage('assistant', data.choices[0].message.content);
            } catch (error) {
                addMessage('assistant', "BAĞLANTI HATASI.");
            } finally {
                loading.style.display = 'none';
            }
        }

        document.getElementById('send-btn').addEventListener('click', () => {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage('user', text);
            userInput.value = '';
            processRequest();
        });

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('send-btn').click(); });
    </script>
</body>
</html>
