<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0d1117; 
            color: #c9d1d9;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #58a6ff;
        }

        #chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.5;
        }

        .user {
            align-self: flex-end;
            background-color: #1f6feb;
            color: white;
        }

        .jarvis {
            align-self: flex-start;
            background-color: #21262d;
            color: #c9d1d9;
        }

        /* Giriş Alanı - Her Şey Kutunun İçinde */
        .input-wrapper {
            padding: 20px;
            background: #0d1117;
        }

        .input-container {
            display: flex;
            align-items: center;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 25px;
            padding: 5px 10px 5px 15px;
        }

        #user-input {
            flex-grow: 1;
            border: none;
            background: transparent;
            padding: 10px;
            outline: none;
            font-size: 15px;
            color: #ecf2f8;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        /* Dosya İkonu */
        .file-icon { color: #8b949e; font-size: 20px; margin-right: 5px; }
        
        /* Gönder Butonu (Kutu İçinde Daire) */
        .send-btn {
            background: #58a6ff;
            color: #ffffff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 18px;
        }

        .send-btn:hover { background: #1f6feb; }

        #loading { text-align: center; font-size: 12px; color: #8b949e; margin-bottom: 5px; display: none; }
    </style>
</head>
<body>

    <header>Jarvis</header>

    <div id="chat-box">
        <div class="msg jarvis">Selam, ben Jarvis. Yardıma hazırım!</div>
    </div>
    
    <div id="loading">Düşünüyor...</div>

    <div class="input-wrapper">
        <div class="input-container">
            <input type="file" id="file-input" style="display:none" onchange="handleFile(event)">
            <button class="action-btn file-icon" onclick="document.getElementById('file-input').click()" title="Dosya Gönder">📎</button>
            
            <input type="text" id="user-input" placeholder="Bir şeyler yazın..." autocomplete="off">
            
            <button id="send-btn" class="action-btn send-btn">↑</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const loading = document.getElementById('loading');
        const API_URL = "https://jarvis-omega-eosin.vercel.app/api/chat";
        let history = [];

        function add(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user' : 'jarvis'}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            if (role !== 'status') history.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
        }

        async function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const r = new FileReader();
            r.onload = async (ev) => {
                add('user', `Dosya yüklendi: ${file.name}`);
                history.push({ role: "user", content: `Dosya içeriği: ${ev.target.result}` });
                process();
            };
            r.readAsText(file);
        }

        async function process() {
            const t = userInput.value.trim();
            if (!t && (!history.length || history[history.length-1].role !== 'user')) return;
            if (t) { add('user', t); userInput.value = ''; }
            
            loading.style.display = 'block';
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: history })
                });
                const d = await res.json();
                if (d.choices) add('assistant', d.choices[0].message.content);
            } catch (err) {
                add('assistant', "Bağlantı hatası.");
            } finally {
                loading.style.display = 'none';
            }
        }

        document.getElementById('send-btn').addEventListener('click', process);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') process(); });
    </script>
</body>
</html>
