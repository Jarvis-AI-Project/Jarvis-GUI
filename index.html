<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0d1117; 
            color: #c9d1d9;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #58a6ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            background: transparent;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-small:hover { border-color: #8b949e; color: #fff; }
        
        #load-btn { 
            display: none; 
            background: rgba(35, 134, 54, 0.1); 
            border-color: #238636; 
            color: #3fb950; 
        }

        #chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #161b22;
            margin: 0 20px;
            border-radius: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.5;
        }

        .user { align-self: flex-end; background-color: #1f6feb; color: white; }
        .jarvis { align-self: flex-start; background-color: #21262d; color: #c9d1d9; }

        .input-wrapper { padding: 20px; background: #0d1117; }
        .input-container {
            display: flex;
            align-items: center;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 8px 12px;
        }

        #user-input {
            flex-grow: 1;
            border: none;
            background: transparent;
            padding: 10px;
            outline: none;
            font-size: 15px;
            color: #ecf2f8;
        }

        .action-btn {
            background: #58a6ff;
            border: none;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            margin-left: 10px;
        }

        .file-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .file-btn:hover { opacity: 1; }
        .file-btn svg { width: 24px; height: 24px; fill: #8b949e; }

        #loading { text-align: center; font-size: 12px; color: #8b949e; margin-bottom: 5px; display: none; }
    </style>
</head>
<body>

    <header>
        <div style="width: 100px;"></div>
        <div>Jarvis</div>
        <div class="header-actions">
            <button id="load-btn" class="btn-small" onclick="loadHistory()">Devam Et</button>
            <button class="btn-small" onclick="clearHistory()">Temizle</button>
        </div>
    </header>

    <div id="chat-box"></div>
    <div id="loading">...</div>

    <div class="input-wrapper">
        <div class="input-container">
            <input type="file" id="file-input" style="display:none" onchange="handleFile(event)">
            <button class="file-btn" onclick="document.getElementById('file-input').click()">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"></path></svg>
            </button>
            <input type="text" id="user-input" placeholder="Mesaj yazın veya dosya ekleyin..." autocomplete="off">
            <button id="send-btn" class="action-btn">Gönder</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const loading = document.getElementById('loading');
        const loadBtn = document.getElementById('load-btn');
        const API_URL = "https://jarvis-omega-eosin.vercel.app/api/chat";
        let history = [];

        window.onload = () => {
            const saved = localStorage.getItem('jarvis_v3_history');
            if (saved) loadBtn.style.display = 'block';
            renderMsg('jarvis', 'Ben Jarvis. Nasıl yardımcı olabilirim?');
        };

        function loadHistory() {
            const saved = localStorage.getItem('jarvis_v3_history');
            if (saved) {
                history = JSON.parse(saved);
                chatBox.innerHTML = '';
                history.forEach(m => renderMsg(m.role === 'user' ? 'user' : 'jarvis', m.content));
                loadBtn.style.display = 'none';
            }
        }

        function clearHistory() {
            if(confirm("Sohbeti sıfırlamak istiyor musunuz?")) {
                localStorage.removeItem('jarvis_v3_history');
                history = [];
                chatBox.innerHTML = '';
                loadBtn.style.display = 'none';
                renderMsg('jarvis', 'Sohbet sıfırlandı.');
            }
        }

        function renderMsg(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function add(role, text) {
            renderMsg(role === 'user' ? 'user' : 'jarvis', text);
            history.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
            localStorage.setItem('jarvis_v3_history', JSON.stringify(history));
            loadBtn.style.display = 'none';
        }

        async function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const r = new FileReader();
            r.onload = async (ev) => {
                add('user', `Dosya: ${file.name}`);
                history.push({ role: "user", content: `Dosya içeriği: ${ev.target.result}` });
                process();
            };
            r.readAsText(file);
        }

        async function process() {
            const t = userInput.value.trim();
            if (!t && (!history.length || history[history.length-1].role !== 'user')) return;
            if (t) { add('user', t); userInput.value = ''; }
            
            loading.style.display = 'block';
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: history })
                });
                const d = await res.json();
                if (d.choices) add('assistant', d.choices[0].message.content);
            } catch (err) {
                renderMsg('jarvis', "Bağlantı hatası.");
            } finally {
                loading.style.display = 'none';
            }
        }

        document.getElementById('send-btn').addEventListener('click', process);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') process(); });
    </script>
</body>
</html>
